services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db_ms
    restart: always
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  ms-contratos:
    build:
      context: ./backend
      dockerfile: PDAE-MS-CONTRATOS/Dockerfile
      target: dev
    env_file:
      - ./.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      PORT: "${CONTRATOS_PORT}"
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./backend/PDAE-MS-CONTRATOS/src
          target: /app/src
        - action: sync
          path: ./backend/shared/src
          target: /shared/src
        - action: rebuild
          path: ./backend/PDAE-MS-CONTRATOS/package.json
        - action: rebuild
          path: ./backend/shared/package.json

  ms-usuarios:
