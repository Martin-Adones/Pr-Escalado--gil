services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db_ms
    restart: always
    env_file:
      - path: ../.env
        required: false
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  ms-contratos:
    build:
      context: .
      dockerfile: PDAE-MS-CONTRATOS/Dockerfile
      target: dev
    env_file:
      - path: ../.env
        required: false
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: ${DATABASE_URL}
      PORT: "${CONTRATOS_PORT}"
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:''+(process.env.PORT||''3002'')+''/api/health'',r=>{process.exit(r.statusCode===200?0:1)}).on(''error'',()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    develop:
      watch:
        - action: sync
          path: ./PDAE-MS-CONTRATOS/src
          target: /app/src
        - action: sync
          path: ./shared/src
          target: /shared/src
        - action: rebuild
          path: ./PDAE-MS-CONTRATOS/package.json
        - action: rebuild
          path: ./shared/package.json

