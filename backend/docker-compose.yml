services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db_ms
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  ms-contratos:
    build:
      context: ./PDAE-MS-CONTRATOS
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      PORT: "${CONTRATOS_PORT}"
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${CONTRATOS_PORT}:${CONTRATOS_PORT}"
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./PDAE-MS-CONTRATOS/src
          target: /app/src
        - action: rebuild
          path: ./PDAE-MS-CONTRATOS/package.json

  ms-usuarios:
